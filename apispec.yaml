openapi: 3.1.1
info:
  title: Kontrak Api Toko Online
  description: Dokumentasi backend e-commerce Toko-Online dengan integrasi Redis, Cloudinary, dan Midtrans.
  version: 1.0.0

servers:
  - url: http://localhost/api
    description: Production Proxy via Nginx

paths:
  /csrf-token:
    get:
      operationId: getCsrfToken
      tags: [Auth]
      summary: Dapatkan token CSRF untuk request POST/PATCH/DELETE
      responses:
        "200":
          description: Token berhasil didapatkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token: { type: string }

  /products:
    get:
      operationId: getProducts
      tags: [Public]
      summary: Dapatkan daftar produk (Cached)
      responses:
        "200":
          description: Berhasil mendapatkan daftar produk
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProductByID
      tags: [Public]
      summary: Dapatkan detail produk berdasarkan ID/Slug
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Produk ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /checkout:
    post:
      operationId: checkoutOrder
      tags: [Public]
      summary: Checkout belanjaan (Guest Checkout)
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Pesanan berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Stok tidak mencukupi atau data tidak valid

  /webhook/midtrans:
    post:
      operationId: midtransWebhook
      tags: [Public]
      summary: Callback dari Midtrans
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MidtransWebhookPayload"
      responses:
        "200":
          description: Webhook diterima

  /admin/login:
    post:
      operationId: adminLogin
      tags: [Auth]
      summary: Login Admin (Stateful Session)
      security:
        - CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Login sukses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [Auth]
      summary: Logout Admin (Redis Invalidation)
      security:
        - BearerAuth: []
        - CsrfToken: []
      responses:
        "200":
          description: Logout berhasil

  /upload:
    post:
      operationId: uploadImage
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      summary: Upload gambar ke Cloudinary
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }

  /admin/products:
    post:
      operationId: createProduct
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      summary: Tambah produk baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductRequest"
      responses:
        "201":
          description: Produk dibuat

  /admin/products/{id}:
    patch:
      operationId: updateProduct
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Produk diperbarui
    delete:
      operationId: deleteProduct
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Produk dihapus

  /categories:
    get:
      operationId: getCategories
      tags: [Admin, Public]
      responses:
        "200":
          description: Daftar kategori
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      operationId: createCategory
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCategoryRequest" }
      responses:
        "201":
          description: Kategori dibuat

  /orders:
    get:
      operationId: getAllOrders
      tags: [Admin]
      security:
        - BearerAuth: []
      summary: Daftar semua pesanan (Admin Dashboard)
      responses:
        "200":
          description: Daftar pesanan
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }

  /settings:
    get:
      operationId: getSettings
      tags: [Admin, Public]
      responses:
        "200":
          description: Pengaturan toko
    patch:
      operationId: updateSettings
      tags: [Admin]
      security:
        - BearerAuth: []
        - CsrfToken: []
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingRequest" }
      responses:
        "200":
          description: Pengaturan diupdate

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CsrfToken:
      type: apiKey
      name: X-CSRF-Token
      in: header

  schemas:
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        price: { type: number }
        stock: { type: integer }
        category_id: { type: string, format: uuid }
        is_active: { type: boolean }
        image_url: { type: string }
        category: { $ref: "#/components/schemas/Category" }

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    OrderItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        order_id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        quantity: { type: integer }
        price: { type: number }
        product: { $ref: "#/components/schemas/Product" }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        order_number: { type: string }
        customer_name: { type: string }
        customer_email: { type: string }
        customer_phone: { type: string }
        shipping_address: { type: string }
        total_amount: { type: number }
        status: { type: string }
        note: { type: string }
        whatsapp_url: { type: string }
        snap_token: { type: string }
        snap_redirect_url: { type: string }
        payment_type: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }

    MidtransWebhookPayload:
      type: object
      properties:
        transaction_status: { type: string, enum: [capture, settlement, pending, deny, cancel, expire] }
        fraud_status: { type: string }
        transaction_id: { type: string }
        order_id: { type: string, description: "Order Number in our system" }
        gross_amount: { type: string }
        payment_type: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            username: { type: string }
            name: { type: string }

    AddProductRequest:
      type: object
      required: [name, price, category_id]
      properties:
        name: { type: string }
        price: { type: number }
        category_id: { type: string, format: uuid }
        description: { type: string }
        stock: { type: integer }

    UpdateProductRequest:
      type: object
      properties:
        name: { type: string }
        price: { type: number }
        stock: { type: integer }
        is_active: { type: boolean }

    UpdateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    UpdateSettingRequest:
      type: object
      properties:
        store_name: { type: string }
        whatsapp_number: { type: string }
        address_info: { type: string }

    CheckoutRequest:
      type: object
      required: [customer_name, customer_email, shipping_address, items]
      properties:
        customer_name: { type: string }
        customer_email: { type: string }
        customer_phone: { type: string }
        shipping_address: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }
